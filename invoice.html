
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Invoice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .invoice {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    .total {
      margin-top: 25px;
      text-align: right;
      font-size: 18px;
      font-weight: bold;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="invoice">
    <h1>SMART INVOICE AI</h1>

    <p><strong>Customer:</strong> Rahul</p>
    <p><strong>Payment Method:</strong> UPI</p>

    <table>
      <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Unit Price</th>
        <th>Total</th>
      </tr>

      
        <tr>
          <td>notebooks</td>
          <td>2</td>
          <td>₹50</td>
          <td>₹100</td>
        </tr>
      
        <tr>
          <td>pen</td>
          <td>1</td>
          <td>₹20</td>
          <td>₹20</td>
        </tr>
      
    </table>

    <div class="total">
      <p>Subtotal: ₹120</p>
      <p>GST (5%): ₹6</p>
      <h2>Grand Total: ₹126</h2>
    </div>

    <div class="footer">
      Thank you for shopping with us!
    </div>
  </div>
</body>
</html>
